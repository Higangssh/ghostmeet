<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>attend meeting</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-6">
    <h1 class="text-2xl font-bold mb-2">Meeting Dashboard</h1>
    <p class="text-zinc-400 mb-4">Bot ID: {{ bot_id }}</p>

    <div class="mb-4 flex gap-2">
      <button id="leaveBtn" class="px-4 py-2 rounded bg-red-600 hover:bg-red-500">Leave + Summarize</button>
      <span id="status" class="text-zinc-400"></span>
    </div>

    <div class="rounded border border-zinc-800 bg-zinc-900 p-4 h-[420px] overflow-y-auto" id="transcript"></div>

    <pre id="summary" class="mt-4 p-4 rounded bg-zinc-900 border border-zinc-800 whitespace-pre-wrap"></pre>
  </div>

  <script>
    const botId = '{{ bot_id }}';
    const transcriptEl = document.getElementById('transcript');
    const statusEl = document.getElementById('status');
    const summaryEl = document.getElementById('summary');
    const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws/meeting/${botId}`);

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.type === 'status') {
        statusEl.textContent = `status: ${data.status}`;
        return;
      }
      const line = document.createElement('div');
      line.className = 'mb-2';
      line.innerHTML = `<span class="text-blue-300">${data.speaker}</span>: ${data.text}`;
      transcriptEl.appendChild(line);
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
    };

    document.getElementById('leaveBtn').addEventListener('click', async () => {
      const res = await fetch(`/api/meeting/${botId}/leave`, { method: 'POST' });
      const data = await res.json();
      if (data.summary) {
        summaryEl.textContent = data.summary.summary;
      }
    });
  </script>
</body>
</html>
